  // ── MENU ────────────────────────────────────────────────────────────────
  const [menuBot, setMenuBot] = useState(BOTS[9]); 
  const [menuColor, setMenuColor] = useState("w");
  const [menuTime, setMenuTime] = useState(TIME_MODES[0]);
  const [filterTier, setFilterTier] = useState(null);
  const tiers = [...new Set(BOTS.map(b => b.tier))];

  if (screen === "menu") return(
    <div style={{minHeight:"100vh", background:"linear-gradient(160deg,#080a12 0%,#0f1420 55%,#0c1018 100%)", display:"flex", flexDirection:"column", alignItems:"center", padding:"20px 12px 40px", fontFamily:"Cinzel,Georgia,serif", color:"#e0d8c8", overflowY:"auto"}}>
      {showSet && <SettingsPanel settings={settings} onSave={s => { setSettings(s); }} onClose={() => setShowSet(false)} />}
      
      <div style={{width:"100%", maxWidth:700, display:"flex", justifyContent:"flex-end", marginBottom:10}}>
        <button onClick={() => setShowSet(true)} className="glass-panel" style={{borderRadius:8, color:"#a098b0", padding:"8px 16px", cursor:"pointer", fontFamily:"Cinzel,serif", fontSize:11, transition:"all .2s", fontWeight:700}}
          onMouseEnter={e => { e.currentTarget.style.color = "#c8a84b"; e.currentTarget.style.borderColor = "rgba(200,168,75,0.4)"; }}
          onMouseLeave={e => { e.currentTarget.style.color = "#a098b0"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.08)"; }}>⚙ Settings</button>
      </div>
      
      <div style={{textAlign:"center", marginBottom:30, animation:"fadeUp .65s cubic-bezier(0.34, 1.56, 0.64, 1)"}}>
        <div style={{fontSize:52, animation:"bob 3.5s ease-in-out infinite", display:"inline-block", marginBottom:6, filter:"drop-shadow(0 0 25px rgba(200,168,75,0.6))", color:"#c8a84b"}}>♞</div>
        <h1 style={{fontFamily:"Cinzel,serif", fontSize:"clamp(24px,5vw,42px)", fontWeight:900, color:"#e8dfc8", textShadow:"0 0 40px rgba(200,168,75,0.3)", letterSpacing:"3px"}}>CHESS TRAINER</h1>
        <div style={{width:120, height:2, background:"linear-gradient(90deg,transparent,#c8a84b,transparent)", margin:"12px auto"}}/>
        <p style={{fontFamily:"Crimson Pro,serif", fontSize:13, color:"#6a6478", letterSpacing:"5px", textTransform:"uppercase"}}>25 Bots · QS Engine · CPL Analysis</p>
      </div>
      
      <div style={{width:"100%", maxWidth:700, marginBottom:16, animation:"fadeUp .65s ease .05s both"}}>
        <p style={{fontFamily:"Cinzel,serif", fontSize:10, letterSpacing:"4px", textTransform:"uppercase", color:"#6a6478", marginBottom:10}}>Filter by Level</p>
        <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
          {[null, ...tiers].map(t => (
            <div key={t || "all"} onClick={() => setFilterTier(t)} style={{padding:"6px 14px", borderRadius:24, cursor:"pointer", fontSize:11, fontWeight:700, fontFamily:"Cinzel,serif", background:filterTier===t?"rgba(200,168,75,.2)":"rgba(255,255,255,.03)", border:`1px solid ${filterTier===t?"#c8a84b":"rgba(255,255,255,.08)"}`, color:filterTier===t?"#c8a84b":"#8a8498", transition:"all .2s", boxShadow:filterTier===t?"0 0 12px rgba(200,168,75,0.2)":"none"}}>
              {t || "All Levels"}
            </div>
          ))}
        </div>
      </div>

      <div className="glass-panel" style={{width:"100%", maxWidth:700, borderRadius:16, padding:"20px", marginBottom:20, animation:"fadeUp .65s ease .1s both"}}>
        <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(135px,1fr))", gap:10}}>
          {(filterTier ? BOTS.filter(b => b.tier === filterTier) : BOTS).map(b => (
            <div key={b.id} onClick={() => setMenuBot(b)} style={{padding:"14px 10px", borderRadius:12, cursor:"pointer", textAlign:"center", background:menuBot.id===b.id?`linear-gradient(135deg,${b.clr}2a,${b.clr}0f)`:"rgba(0,0,0,0.3)", border:`2px solid ${menuBot.id===b.id?b.clr:"rgba(255,255,255,.05)"}`, transition:"all .2s", boxShadow:menuBot.id===b.id?`0 6px 20px ${b.clr}35`:"none"}}
              onMouseEnter={e => { if (menuBot.id !== b.id) e.currentTarget.style.borderColor = "rgba(255,255,255,0.2)"; }}
              onMouseLeave={e => { if (menuBot.id !== b.id) e.currentTarget.style.borderColor = "rgba(255,255,255,.05)"; }}>
              <div style={{fontSize:24, marginBottom:6, filter:menuBot.id===b.id?`drop-shadow(0 0 8px ${b.clr})`:"none"}}>{b.em}</div>
              <div style={{fontFamily:"Cinzel,serif", fontSize:12, fontWeight:900, color:menuBot.id===b.id?b.clr:"#c0b8a0", marginBottom:2}}>{b.name}</div>
              <div style={{fontSize:10, color:menuBot.id===b.id?b.clr+"bb":"#6a6478", fontFamily:"Crimson Pro,monospace", fontWeight:600}}>ELO {b.elo}</div>
            </div>
          ))}
        </div>
        
        {menuBot && (
          <div style={{marginTop:16, padding:"12px 16px", background:"rgba(0,0,0,0.4)", borderRadius:10, borderLeft:`4px solid ${menuBot.clr}`, fontFamily:"Crimson Pro,serif", fontSize:13, color:"#a098b0", fontStyle:"italic", display:"flex", alignItems:"center", gap:12}}>
            <span style={{fontSize:28}}>{menuBot.em}</span>
            <span>{menuBot.desc}</span>
          </div>
        )}
        
        {menuBot && (() => {
            const bp = eloToParams(menuBot.elo);
            return (
              <div style={{marginTop:12, display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap"}}>
                {[["Search Depth", bp.depth+" ply"], ["Blunder Rate", Math.round(bp.blunder*100)+"%"], ["Book Knowledge", Math.round(bp.book*100)+"%"]].map(([k, v]) => (
                  <div key={k} style={{background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,0.05)", borderRadius:8, padding:"6px 14px", textAlign:"center"}}>
                    <div style={{fontFamily:"Crimson Pro,serif", fontSize:10, color:"#6a6478", textTransform:"uppercase", letterSpacing:"1px", marginBottom:2}}>{k}</div>
                    <div style={{fontFamily:"Cinzel,serif", fontSize:14, fontWeight:900, color:"#c8a84b"}}>{v}</div>
                  </div>
                ))}
              </div>
            );
        })()}
      </div>

      <div style={{display:"flex", gap:20, width:"100%", maxWidth:700, flexWrap:mob?"wrap":"nowrap", animation:"fadeUp .65s ease .15s both"}}>
        <div className="glass-panel" style={{flex:1, borderRadius:16, padding:"20px", minWidth:300}}>
          <p style={{fontFamily:"Cinzel,serif", fontSize:10, letterSpacing:"3px", textTransform:"uppercase", color:"#6a6478", marginBottom:12}}>Time Control</p>
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))", gap:8}}>
            {TIME_MODES.map(tm => (
              <div key={tm.id} onClick={() => setMenuTime(tm)} style={{padding:"10px 8px", borderRadius:10, cursor:"pointer", textAlign:"center", background:menuTime.id===tm.id?"rgba(200,168,75,.15)":"rgba(0,0,0,0.3)", border:`2px solid ${menuTime.id===tm.id?"#c8a84b":"rgba(255,255,255,.05)"}`, transition:"all .2s"}}>
                <div style={{fontFamily:"Cinzel,serif", fontSize:12, fontWeight:700, color:menuTime.id===tm.id?"#c8a84b":"#8a8498"}}>{tm.label}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="glass-panel" style={{flex:1, borderRadius:16, padding:"20px", minWidth:300}}>
          <p style={{fontFamily:"Cinzel,serif", fontSize:10, letterSpacing:"3px", textTransform:"uppercase", color:"#6a6478", marginBottom:12}}>Play As</p>
          <div style={{display:"flex", gap:10}}>
            {[{v:"w", l:"White", s:"♔"}, {v:"b", l:"Black", s:"♚"}, {v:"r", l:"Random", s:"🎲"}].map(o => (
              <div key={o.v} onClick={() => setMenuColor(o.v)} style={{flex:1, padding:"16px 8px", borderRadius:10, cursor:"pointer", textAlign:"center", background:menuColor===o.v?"rgba(200,168,75,.15)":"rgba(0,0,0,0.3)", border:`2px solid ${menuColor===o.v?"#c8a84b":"rgba(255,255,255,.05)"}`, transition:"all .2s"}}>
                <div style={{fontSize:28, marginBottom:6, filter:menuColor===o.v?"drop-shadow(0 0 6px #c8a84b)":"none"}}>{o.s}</div>
                <div style={{fontFamily:"Cinzel,serif", fontSize:12, color:menuColor===o.v?"#c8a84b":"#8a8498", fontWeight:900, letterSpacing:"1px", textTransform:"uppercase"}}>{o.l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <button 
        onClick={() => { const pc = menuColor === "r" ? (Math.random() < 0.5 ? "w" : "b") : menuColor; startGame(menuBot, pc, menuTime); }}
        style={{marginTop:30, background:"linear-gradient(135deg,#c8a84b,#8a6820)", color:"#0d0900", border:"none", borderRadius:12, padding:"18px 60px", fontFamily:"Cinzel,serif", fontSize:16, fontWeight:900, cursor:"pointer", letterSpacing:"4px", textTransform:"uppercase", boxShadow:"0 10px 30px rgba(200,168,75,0.4)", transition:"all .2s", animation:"fadeUp .65s ease .25s both"}}
        onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-4px) scale(1.02)"; e.currentTarget.style.boxShadow = "0 15px 45px rgba(200,168,75,0.6)"; }}
        onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "0 10px 30px rgba(200,168,75,0.4)"; }}>
        Begin Game
      </button>
    </div>
  );

  // ── REVIEW SCREEN ────────────────────────────────────────────────────────
  if (screen === "review") {
    const rBoard = revIdx < 0 ? INIT_BOARD() : history[revIdx]?.board || INIT_BOARD();
    const rLM = revIdx >= 0 ? [history[revIdx]?.fr, history[revIdx]?.fc, history[revIdx]?.tr, history[revIdx]?.tc] : null;
    const rEval = revIdx < 0 ? 0 : evalHist[revIdx + 1] || 0;
    const rWp = evalToW(rEval);
    const maxE = Math.max(...evalHist.map(Math.abs), 200);
    const pts = evalHist.map((e, i) => { 
      const x = (i / (evalHist.length - 1 || 1)) * 100;
      const y = 50 - ((Math.max(-maxE, Math.min(maxE, e)) / maxE) * 44); 
      return [x, y]; 
    });
    
    const CATS = [
      ["💎","Brilliant","#00BCD4"], ["✦","Best","#4CAF50"], 
      ["✨","Excellent","#8BC34A"], ["⚠️","Inaccuracy","#FF9800"], 
      ["❗","Mistake","#FF5722"], ["💥","Blunder","#F44336"]
    ];
    
    useEffect(() => {
      const handleKey = (e) => {
        if (e.key === "ArrowLeft") setRevIdx(i => Math.max(-1, i - 1));
        else if (e.key === "ArrowRight") setRevIdx(i => Math.min(history.length - 1, i + 1));
      };
      window.addEventListener("keydown", handleKey);
      return () => window.removeEventListener("keydown", handleKey);
    }, [history.length]);

    return(
      <div style={{height:"100vh", background:"#080a12", color:"#e0d8c8", fontFamily:"Cinzel,Georgia,serif", display:"flex", flexDirection:"column", overflow:"hidden"}}>
        {showSet && <SettingsPanel settings={settings} onSave={setSettings} onClose={() => setShowSet(false)}/>}
        <div style={{background:"#0d0f1a", borderBottom:"1px solid #1c1e2c", padding:"10px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0}}>
          <div style={{display:"flex", alignItems:"center", gap:12}}>
            <span style={{fontSize:20, color:"#c8a84b"}}>♞</span>
            <span style={{fontFamily:"Cinzel,serif", fontWeight:900, fontSize:14, color:"#c8a84b", letterSpacing:"1px"}}>Game Review</span>
            {result && <span style={{fontFamily:"Crimson Pro,serif", fontSize:11, color:"#6a6478", borderLeft:"1px solid #1c1e2c", paddingLeft:12}}>{result.replace(/[🤝♟🏆⏱]/g, '')}</span>}
          </div>
          <div style={{display:"flex", gap:8}}>
            <button onClick={() => setShowSet(true)} style={{background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.08)", borderRadius:8, color:"#a098b0", padding:"6px 12px", cursor:"pointer", fontFamily:"Cinzel,serif", fontSize:12}}>⚙</button>
            <button onClick={() => setScreen("menu")} style={{background:"linear-gradient(135deg,#c8a84b,#8a6820)", color:"#0d0900", border:"none", borderRadius:8, padding:"8px 18px", cursor:"pointer", fontFamily:"Cinzel,serif", fontSize:11, fontWeight:900, letterSpacing:"1px"}}>New Game</button>
          </div>
        </div>
        <div style={{flex:1, display:"flex", overflow:"hidden"}}>
          {!mob && (
            <div style={{width:240, background:"#0d0f1a", borderRight:"1px solid #1c1e2c", padding:"16px", overflowY:"auto", flexShrink:0, display:"flex", flexDirection:"column", gap:14}}>
              {[{l:"♔ White", acc:wAcc, c:"w"}, {l:`♚ Black`, acc:bAcc, c:"b", clr:botSide==="b"?bot.clr:null}].map((x, i) => (
                <div key={i} className="glass-panel" style={{borderRadius:12, padding:"16px"}}>
                  <div style={{fontFamily:"Crimson Pro,serif", fontSize:11, color:"#8a8498", marginBottom:8, fontWeight:600}}>
                    {x.l} {x.c === pColor ? "(You)" : `(${bot.name})`}
                  </div>
                  <div style={{fontFamily:"Cinzel,serif", fontSize:32, fontWeight:900, color:x.acc>=80?"#4CAF50":x.acc>=60?"#FF9800":"#f44336", lineHeight:1}}>{x.acc??0}%</div>
                  <div style={{fontFamily:"Crimson Pro,serif", fontSize:10, color:"#6a6478", marginBottom:12, marginTop:4, letterSpacing:"1px", textTransform:"uppercase"}}>Accuracy</div>
                  <div style={{height:6, background:"#0a0c14", borderRadius:3, border:"1px solid rgba(255,255,255,0.05)"}}><div style={{height:"100%", width:`${x.acc??0}%`, background:x.acc>=80?"#4CAF50":x.acc>=60?"#FF9800":"#f44336", borderRadius:3, transition:"width 1s cubic-bezier(0.34, 1.56, 0.64, 1)"}}/></div>
                  <div style={{marginTop:16}}>
                    {CATS.map(([em, label, clr]) => {
                      const n = history.filter(m => cl(m.piece) === x.c && m.classification?.label === label).length;
                      return n > 0 ? (
                        <div key={label} style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6}}>
                          <span style={{fontFamily:"Crimson Pro,serif", fontSize:11, color:"#a098b0"}}>{em} {label}</span>
                          <span style={{fontFamily:"Cinzel,serif", fontSize:13, fontWeight:900, color:clr}}>{n}</span>
                        </div>
                      ) : null;
                    })}
                  </div>
                  <div style={{marginTop:12, paddingTop:12, borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                    <div style={{fontFamily:"Crimson Pro,serif", fontSize:10, color:"#6a6478", marginBottom:4, textTransform:"uppercase", letterSpacing:"1px"}}>Avg CPL</div>
                    <div style={{fontFamily:"Cinzel,serif", fontSize:18, fontWeight:900, color:"#c8a84b"}}>
                      {(() => {
                        const pm = history.filter(m => cl(m.piece) === x.c);
                        return pm.length ? Math.round(pm.reduce((s, m) => s + (m.cpl || 0), 0) / pm.length) : 0;
                      })()}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
          
          <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden", background:"radial-gradient(ellipse at center, #121520 0%, #080a12 100%)"}}>
            <div style={{height:100, background:"#0d0f1a", borderBottom:"1px solid #1c1e2c", padding:"12px 16px", flexShrink:0}}>
              <svg width="100%" height="76" style={{display:"block", cursor:"pointer"}}>
                <rect width="100%" height="100%" fill="transparent"/>
                <line x1="0%" y1="50%" x2="100%" y2="50%" stroke="rgba(255,255,255,0.1)" strokeWidth="1" strokeDasharray="4 4"/>
                <path d={`M${pts[0]?.[0]}% 50 ${pts.map(([x, y]) => `L${x}% ${y}`).join(" ")} L${pts[pts.length-1]?.[0]}% 50 Z`} fill="rgba(200,168,75,.15)"/>
                <polyline points={pts.map(([x, y]) => `${x}% ${y}`).join(" ")} fill="none" stroke="#c8a84b" strokeWidth="2.5" style={{filter:"drop-shadow(0 2px 4px rgba(0,0,0,0.5))"}}/>
                {revIdx >= 0 && pts[revIdx + 1] && <circle cx={`${pts[revIdx + 1][0]}%`} cy={pts[revIdx + 1][1]} r="6" fill="#fff" stroke="#c8a84b" strokeWidth="3" style={{filter:"drop-shadow(0 0 8px #c8a84b)"}}/>}
                {pts.map((_, i) => i > 0 && <rect key={i} x={`${(i / (pts.length || 1)) * 100}%`} y="0" width={`${100 / (pts.length || 1)}%`} height="76" fill="transparent" onClick={() => setRevIdx(i - 1)}/>)}
              </svg>
            </div>
            
            <div style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"16px", overflow:"hidden", gap:8}}>
              <div style={{width:"min(calc(100vh - 300px),500px)"}}><EvalBar wp={rWp} ev={rEval}/></div>
              <div style={{width:"min(calc(100vh - 300px),500px)", aspectRatio:"1/1", borderRadius:12, overflow:"hidden", boxShadow:"0 25px 70px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,0.05)"}}>
                <Board brd={rBoard} lm={rLM} clickable={false} legalMoves={[]} sel={null} chk={false} curTurn={"w"} anim={null}/>
              </div>
              
              {revIdx >= 0 && history[revIdx]?.classification && (
                <div style={{width:"min(calc(100vh - 300px),500px)", marginTop:16, padding:"12px 16px", background:"rgba(0,0,0,0.6)", border:`1px solid ${history[revIdx].classification.clr}55`, borderRadius:8, display:"flex", alignItems:"center", gap:12, animation:"fadeIn 0.3s ease"}}>
                  <span style={{fontSize:24, fontWeight:900, color:history[revIdx].classification.clr}}>{history[revIdx].classification.sym}</span>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"Cinzel,serif", fontWeight:900, fontSize:14, color:history[revIdx].classification.clr, letterSpacing:"1px"}}>{history[revIdx].classification.label} Move</div>
                    <div style={{fontFamily:"Crimson Pro,serif", fontSize:12, color:"#a098b0"}}>{getCoachFeedback(history[revIdx].classification, history[revIdx].piece, history[revIdx].captured)}</div>
                  </div>
                  <div style={{fontFamily:"Crimson Pro,monospace", fontSize:14, fontWeight:700, color:"#fff", background:"rgba(255,255,255,0.1)", padding:"4px 10px", borderRadius:6}}>CPL {history[revIdx].cpl}</div>
                </div>
              )}
            </div>
            
            <div style={{height:56, background:"#0d0f1a", borderTop:"1px solid #1c1e2c", display:"flex", alignItems:"center", justifyContent:"center", gap:12, flexShrink:0}}>
              {[["⏮", () => setRevIdx(-1)], ["◀", () => setRevIdx(i => Math.max(-1, i - 1))], ["▶", () => setRevIdx(i => Math.min(history.length - 1, i + 1))], ["⏭", () => setRevIdx(history.length - 1)]].map(([l, fn]) => (
                <button key={l} onClick={fn} style={{background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:8, color:"#c8a84b", padding:"8px 20px", cursor:"pointer", fontSize:16, fontFamily:"Cinzel,monospace", transition:"all .2s"}} onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,0.1)"; }} onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.05)"; }}>{l}</button>
              ))}
              <span style={{fontFamily:"Crimson Pro,serif", color:"#6a6478", fontSize:13, marginLeft:12, fontWeight:600}}>Move {revIdx + 1} / {history.length}</span>
            </div>
          </div>
          
          {!mob && (
            <div style={{width:240, background:"#0d0f1a", borderLeft:"1px solid #1c1e2c", display:"flex", flexDirection:"column", flexShrink:0}}>
              <div style={{padding:"12px 16px", borderBottom:"1px solid #1c1e2c", fontFamily:"Cinzel,serif", fontSize:10, letterSpacing:"3px", color:"#6a6478", textTransform:"uppercase", fontWeight:700}}>Annotated Moves</div>
              <MoveList hist={history} active={revIdx} onNav={setRevIdx}/>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── GAME PLAYING SCREEN ─────────────────────────────────────────────────
  return(
    <div style={{height:"100vh", background:"#080a12", color:"#e0d8c8", fontFamily:"Cinzel,Georgia,serif", display:"flex", flexDirection:"column", overflow:"hidden"}}>
      {showSet && <SettingsPanel settings={settings} onSave={s => { setSettings(s); }} onClose={() => setShowSet(false)} />}
      
      {result && (
        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,.85)", backdropFilter:"blur(8px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000, animation:"fadeIn .3s ease"}}>
          <div className="glass-panel" style={{borderRadius:20, padding:"40px 50px", textAlign:"center", boxShadow:"0 30px 90px rgba(0,0,0,.9), 0 0 50px rgba(200,168,75,.15)", animation:"modalPop .5s cubic-bezier(.34,1.56,.64,1)"}}>
            <div style={{fontSize:56, marginBottom:12, filter:"drop-shadow(0 0 16px rgba(200,168,75,.5))"}}>🏆</div>
            <div style={{fontFamily:"Cinzel,serif", fontSize:26, fontWeight:900, color:"#e8dfc8", marginBottom:10, letterSpacing:"2px"}}>{result.replace(/[🤝♟🏆⏱]/g, '')}</div>
            <div style={{fontFamily:"Crimson Pro,serif", fontSize:15, color:"#a098b0", marginBottom:30, background:"rgba(0,0,0,0.4)", padding:"10px 20px", borderRadius:8, display:"inline-block"}}>
              Your Accuracy: <b style={{fontSize:18, color:myAcc>=80?"#4CAF50":myAcc>=60?"#FF9800":"#f44336"}}>{myAcc}%</b> <br/>
              Bot Accuracy: <b style={{fontSize:18, color:botAcc>=80?"#4CAF50":botAcc>=60?"#FF9800":"#f44336"}}>{botAcc}%</b>
            </div>
            <div style={{display:"flex", gap:16, justifyContent:"center"}}>
              <button onClick={() => { setRevIdx(-1); setScreen("review"); }} style={{background:"linear-gradient(135deg,#c8a84b,#8a6820)", color:"#0d0900", border:"none", borderRadius:10, padding:"12px 26px", cursor:"pointer", fontFamily:"Cinzel,serif", fontSize:13, fontWeight:900, letterSpacing:"1px", transition:"transform .2s", boxShadow:"0 8px 20px rgba(200,168,75,0.3)"}} onMouseEnter={e => e.currentTarget.style.transform = "scale(1.05) translateY(-2px)"} onMouseLeave={e => e.currentTarget.style.transform = "none"}>📊 Review Game</button>
              <button onClick={() => setScreen("menu")} style={{background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,255,255,.1)", color:"#c0b8a0", borderRadius:10, padding:"12px 26px", cursor:"pointer", fontFamily:"Cinzel,serif", fontSize:13, fontWeight:900, letterSpacing:"1px", transition:"all .2s"}} onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,.1)"} onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,.05)"}>Main Menu</button>
            </div>
          </div>
        </div>
      )}

      <div style={{background:"#0d0f1a", borderBottom:"1px solid #1c1e2c", padding:"10px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0}}>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <span style={{fontSize:20, color:"#c8a84b"}}>♞</span>
          <span style={{fontFamily:"Cinzel,serif", fontWeight:900, fontSize:14, color:"#c8a84b", letterSpacing:"2px"}}>CHESS TRAINER</span>
          {!mob && <span style={{fontFamily:"Crimson Pro,serif", fontSize:11, color:"#6a6478", borderLeft:"1px solid #1c1e2c", paddingLeft:12, fontWeight:600}}>{bot.em} {bot.name} · ELO {bot.elo}</span>}
        </div>
        <div style={{display:"flex", gap:8}}>
          <button onClick={() => setShowSet(true)} style={{background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.08)", borderRadius:8, color:"#a098b0", padding:"6px 12px", cursor:"pointer", fontFamily:"Cinzel,serif", fontSize:11, transition:"all 0.2s"}} onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.1)"} onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,0.04)"}>⚙ Settings</button>
          {history.length > 1 && !result && <button onClick={takeback} style={{background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.08)", borderRadius:8, color:"#a098b0", padding:"6px 12px", cursor:"pointer", fontSize:11, fontFamily:"Cinzel,serif", fontWeight:700, transition:"all .2s"}} onMouseEnter={e => { e.currentTarget.style.color = "#c8a84b"; e.currentTarget.style.borderColor = "rgba(200,168,75,0.4)"; }} onMouseLeave={e => { e.currentTarget.style.color = "#a098b0"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.08)"; }}>↩ Takeback</button>}
          <button onClick={() => setScreen("menu")} style={{background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.08)", borderRadius:8, color:"#a098b0", padding:"6px 12px", cursor:"pointer", fontFamily:"Cinzel,serif", fontSize:11, fontWeight:700, transition:"all 0.2s"}} onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.1)"} onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,0.04)"}>Menu</button>
        </div>
      </div>
      
      {mob ? (
        <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden", background:"radial-gradient(ellipse at center, #121520 0%, #080a12 100%)"}}>
          <div style={{padding:"6px 12px", flexShrink:0}}><PCard side={botSide} active={turn===botSide && !result}/></div>
          <div style={{padding:"4px 12px 2px", flexShrink:0}}><EvalBar wp={winPct} ev={curEval}/></div>
          
          {chkFlag && !result && (
            <div style={{padding:"2px 12px", flexShrink:0}}>
              <div style={{background:"rgba(244,67,54,.15)", border:"1px solid rgba(244,67,54,.4)", borderRadius:6, padding:"4px", textAlign:"center", animation:"pulse .7s infinite"}}>
                <span style={{fontFamily:"Cinzel,serif", fontSize:12, fontWeight:900, color:"#f44336", letterSpacing:"1px"}}>CHECK!</span>
              </div>
            </div>
          )}
          
          <div style={{flexShrink:0, padding:"4px 12px", position:"relative"}}>
            <div style={{width:"100%", aspectRatio:"1/1", borderRadius:10, overflow:"hidden", boxShadow:"0 15px 50px rgba(0,0,0,.9)", border:`1px solid rgba(255,255,255,0.05)`}}>
              <Board brd={board} lm={lastMove} clickable={true} legalMoves={legal} sel={selSq} chk={chkFlag} curTurn={turn} anim={landSq}/>
            </div>
            
            {/* Live Coach Feedback Overlay */}
            {coachMsg && !result && turn !== pColor && (
              <div style={{position:"absolute", top:16, left:24, right:24, background:"rgba(10,12,20,0.95)", border:`1px solid ${coachMsg.clr}66`, borderRadius:8, padding:"10px 14px", zIndex:5, animation:"slideDown .3s cubic-bezier(0.34, 1.56, 0.64, 1)", backdropFilter:"blur(8px)", display:"flex", alignItems:"center", gap:10, boxShadow:`0 8px 24px rgba(0,0,0,0.8), 0 0 12px ${coachMsg.clr}33`}}>
                <span style={{fontSize:20, fontWeight:900, color:coachMsg.clr}}>{coachMsg.sym}</span>
                <span style={{fontFamily:"Crimson Pro,serif", fontSize:13, color:"#e8dfc8", lineHeight:1.2}}>{coachMsg.text}</span>
              </div>
            )}
          </div>
          
          <div style={{padding:"4px 12px 6px", flexShrink:0}}><PCard side={pColor} active={turn===pColor && !result}/></div>
          
          <div style={{display:"flex", padding:"0 12px", gap:6, flexShrink:0}}>
            {[["moves", "Moves"], ["analysis", "Stats"]].map(([v, l]) => (
              <div key={v} onClick={() => setGameTab(v)} style={{flex:1, padding:"8px", textAlign:"center", borderRadius:"10px 10px 0 0", cursor:"pointer", fontFamily:"Cinzel,serif", fontSize:11, fontWeight:900, letterSpacing:"1px", background:gameTab===v?"#0d0f1a":"rgba(255,255,255,0.02)", border:gameTab===v?"1px solid #1c1e2c":"1px solid transparent", borderBottom:"none", color:gameTab===v?"#c8a84b":"#6a6478", transition:"all 0.2s"}}>{l}</div>
            ))}
          </div>
          
          <div style={{flex:1, background:"#0d0f1a", borderTop:"1px solid #1c1e2c", overflow:"hidden", margin:"0 12px", borderRadius:"0 0 10px 10px", display:"flex", flexDirection:"column"}}>
            {gameTab === "moves" ? (
              <div ref={mlRef} style={{flex:1, overflowY:"auto", padding:"6px"}}><MoveList hist={history} active={history.length-1} onNav={null}/></div>
            ) : (
              <div style={{flex:1, overflowY:"auto", padding:"16px"}}>
                <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:12}}>
                  {[["💎","Brilliant","#00BCD4"], ["✦","Best","#4CAF50"], ["💥","Blunder","#F44336"], ["❗","Mistake","#FF5722"], ["⚠️","Inaccuracy","#FF9800"], ["✨","Excellent","#8BC34A"]].map(([em, label, clr]) => (
                    <div key={label} style={{background:"rgba(255,255,255,.02)", border:"1px solid #1c1e2c", borderRadius:10, padding:"10px 6px", textAlign:"center"}}>
                      <div style={{fontSize:16, marginBottom:4}}>{em}</div>
                      <div style={{fontFamily:"Cinzel,serif", fontSize:22, fontWeight:900, color:history.filter(m => m.classification?.label === label && cl(m.piece) === pColor).length > 0 ? clr : "#2a2030"}}>
                        {history.filter(m => m.classification?.label === label && cl(m.piece) === pColor).length}
                      </div>
                      <div style={{fontSize:9, color:"#6a6478", marginTop:4, textTransform:"uppercase", letterSpacing:"1px", fontFamily:"Crimson Pro,serif"}}>{label}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      ) : (
        <div style={{flex:1, display:"flex", overflow:"hidden", background:"radial-gradient(ellipse at center, #121520 0%, #080a12 100%)"}}>
          <div style={{width:240, background:"#0d0f1a", borderRight:"1px solid #1c1e2c", display:"flex", flexDirection:"column", padding:"16px", gap:12, flexShrink:0}}>
            <PCard side={botSide} active={turn===botSide && !result}/>
            <PCard side={pColor} active={turn===pColor && !result}/>
            
            {chkFlag && !result && (
              <div style={{background:"rgba(244,67,54,.15)", border:"1px solid rgba(244,67,54,.4)", borderRadius:10, padding:"8px", textAlign:"center", animation:"pulse .8s infinite"}}>
                <span style={{fontFamily:"Cinzel,serif", fontSize:13, fontWeight:900, color:"#f44336", letterSpacing:"2px"}}>CHECK!</span>
              </div>
            )}
            
            {history.length > 1 && (
              <div className="glass-panel" style={{flex:1, borderRadius:12, padding:"16px", overflow:"hidden", display:"flex", flexDirection:"column", minHeight:0, marginTop:10}}>
                <div style={{fontFamily:"Cinzel,serif", fontSize:10, letterSpacing:"3px", color:"#6a6478", textTransform:"uppercase", marginBottom:12, fontWeight:700}}>Your Stats</div>
                {[["💎","Brilliant","#00BCD4"], ["✦","Best","#4CAF50"], ["💥","Blunder","#F44336"], ["❗","Mistake","#FF5722"], ["⚠️","Inaccuracy","#FF9800"]].map(([em, label, clr]) => (
                  <div key={label} style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
                    <span style={{fontFamily:"Crimson Pro,serif", fontSize:12, color:"#8a8498"}}>{em} {label}</span>
                    <span style={{fontFamily:"Cinzel,serif", fontSize:14, fontWeight:900, color:history.filter(m => m.classification?.label === label && cl(m.piece) === pColor).length > 0 ? "rgba(255,255,255,0.1)" : "#2a2030"}}>
                      {history.filter(m => m.classification?.label === label && cl(m.piece) === pColor).length}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>
          
          <div style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"16px", overflow:"hidden", gap:8, position:"relative"}}>
            <div style={{width:"min(calc(100vh - 160px),600px)"}}><EvalBar wp={winPct} ev={curEval}/></div>
            <div style={{width:"min(calc(100vh - 160px),600px)", flexShrink:0, borderRadius:12, overflow:"hidden", boxShadow:"0 30px 90px rgba(0,0,0,.9)", border:"1px solid rgba(255,255,255,0.05)", animation:"boardIn .75s cubic-bezier(.34,1.2,.64,1) forwards", position:"relative"}}>
              <Board brd={board} lm={lastMove} clickable={true} legalMoves={legal} sel={selSq} chk={chkFlag} curTurn={turn} anim={landSq}/>
              
              {coachMsg && !result && turn !== pColor && (
                <div style={{position:"absolute", top:20, left:30, right:30, background:"rgba(10,12,20,0.95)", border:`1px solid ${coachMsg.clr}66`, borderRadius:10, padding:"14px 20px", zIndex:5, animation:"slideDown .3s cubic-bezier(0.34, 1.56, 0.64, 1)", backdropFilter:"blur(8px)", display:"flex", alignItems:"center", gap:16, boxShadow:`0 10px 30px rgba(0,0,0,0.8), 0 0 15px ${coachMsg.clr}33`}}>
                  <span style={{fontSize:28, fontWeight:900, color:coachMsg.clr}}>{coachMsg.sym}</span>
                  <div style={{display:"flex", flexDirection:"column", gap:2}}>
                    <span style={{fontFamily:"Cinzel,serif", fontSize:12, color:coachMsg.clr, fontWeight:900, letterSpacing:"1px", textTransform:"uppercase"}}>Coach Analysis</span>
                    <span style={{fontFamily:"Crimson Pro,serif", fontSize:15, color:"#e8dfc8"}}>{coachMsg.text}</span>
                  </div>
                </div>
              )}
            </div>
          </div>
          
          <div style={{width:240, background:"#0d0f1a", borderLeft:"1px solid #1c1e2c", display:"flex", flexDirection:"column", flexShrink:0}}>
            <div style={{padding:"12px 16px", borderBottom:"1px solid #1c1e2c", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <span style={{fontFamily:"Cinzel,serif", fontSize:10, letterSpacing:"3px", color:"#6a6478", textTransform:"uppercase", fontWeight:700}}>Moves</span>
              <span style={{fontFamily:"Cinzel,serif", fontSize:16, fontWeight:900, color:"#c8a84b", background:"rgba(200,168,75,0.1)", padding:"2px 8px", borderRadius:4}}>{fmtEval(curEval)}</span>
            </div>
            <div ref={mlRef} style={{flex:1, overflowY:"auto"}}><MoveList hist={history} active={history.length-1} onNav={null}/></div>
          </div>
        </div>
      )}

      {showPromo && (
        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,.88)", backdropFilter:"blur(6px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000}}>
          <div className="glass-panel" style={{borderRadius:16, padding:"32px", textAlign:"center", boxShadow:"0 24px 80px rgba(0,0,0,.9), 0 0 0 1px rgba(200,168,75,0.3)"}}>
            <div style={{fontFamily:"Cinzel,serif", fontSize:12, color:"#c8a84b", marginBottom:20, letterSpacing:"4px", textTransform:"uppercase", fontWeight:900}}>Promote Pawn</div>
            <div style={{display:"flex", gap:16}}>
              {["Q","R","B","N"].map(t => (
                <div key={t} onClick={() => { execMove(showPromo.fr, showPromo.fc, showPromo.tr, showPromo.tc, t); setShowPromo(null); }}
                  style={{width:80, height:80, background:"rgba(255,255,255,0.05)", border:"2px solid rgba(255,255,255,0.1)", borderRadius:12, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all .2s"}}
                  onMouseEnter={e => { e.currentTarget.style.background = "rgba(200,168,75,.2)"; e.currentTarget.style.borderColor = "rgba(200,168,75,0.6)"; e.currentTarget.style.transform = "scale(1.1)"; }}
                  onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.05)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"; e.currentTarget.style.transform = "scale(1)"; }}>
                  <PieceSVG piece={pColor+t} pStyle={settings.pieceStyle}/>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// 5. Tell ReactDOM to render the component into the div we created
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ChessApp />);
  </script>
</body>
</html>
